# Default experiment configuration for the masked U-FNO GS surrogate.
data:
  path: data/gs_fixed_boundary.npz
  n_samples: 64
  grid_size: [64, 64]
  seed: 42
  params:
    R0: [1.5, 1.9]
    a: [0.35, 0.55]
    kappa: [1.2, 1.9]
    delta: [-0.45, 0.45]
    Ip: [8.0e5, 1.6e6]
    betap: [0.2, 1.0]
    alpha_m: [1.0, 4.0]
    alpha_n: [1.0, 4.0]
model:
  modes1: 16
  modes2: 16
  width: 32
  layers: 4
train:
  epochs: 20
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 1.0e-6
  val_fraction: 0.15
  test_fraction: 0.15
  pde_weight: 0.01
  bc_weight: 0.05
  ip_weight: 0.0
  output_dir: outputs/default_run
